<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Explosion — VS リビールテスト</title>
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#05060f; font-family:"Noto Sans JP",system-ui,sans-serif; color:#fff; overflow:hidden; }
  .wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  /* ── 下層: VS シーン（顔＋VS）。爆発が抜けるとこれが見える ── */
  .vs-scene { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:60px;
              background:radial-gradient(circle at 50% 50%, #3a2168 0%, #1a1440 55%, #0a0a1e 100%); }
  .vs-scene::before { content:""; position:absolute; inset:0;
       background:repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.045) 0 2px, transparent 2px 60px); }
  .face { width:min(20vw,300px); aspect-ratio:1; border-radius:50%; box-shadow:0 10px 40px rgba(0,0,0,.5); z-index:1; }
  .face.a { background:linear-gradient(135deg,#4f9bff,#1e5fd0); }
  .face.b { background:linear-gradient(135deg,#ff6b7d,#c9304b); }
  .vs { font-size:min(16vw,240px); font-weight:900; letter-spacing:.02em; z-index:1;
        text-shadow:0 6px 30px rgba(0,0,0,.6); }
  /* ── 上層: フルスクリーン爆発。中央が抜けて下の VS を見せる ── */
  video.blast { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2; pointer-events:none; }
  .controls { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:5; display:flex; gap:10px; }
  button { background:#ff7a1a; color:#111; border:0; padding:11px 20px; border-radius:10px; font-weight:800; cursor:pointer; }
  .hint { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:5; font-size:13px; opacity:.7; }
</style>
</head>
<body>
  <div class="hint">爆発が画面いっぱいに広がり → 中央が抜けて VS がしっかり見える（背景も透過）</div>
  <div class="wrap">
    <div class="vs-scene">
      <div class="face a"></div>
      <div class="vs">VS</div>
      <div class="face b"></div>
    </div>
    <video id="blast" class="blast" src="hit_explosion_fullscreen.webm" muted playsinline autoplay></video>
  </div>
  <div class="controls">
    <button onclick="replay()">▶ もう一度</button>
  </div>
<script>
  const v = document.getElementById('blast');
  function replay(){ v.currentTime = 0; v.play(); }
  v.addEventListener('loadeddata', ()=> v.play());
</script>
</body>
</html>
